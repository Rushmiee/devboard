<!DOCTYPE html>
<html>
<head>
  <title>Devboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4c1d95, #7e22ce, #c084fc);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card {
      max-width: 520px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }
    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      line-height: 1.5;
      color: #f3e8ff;
    }
    button {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #6b21a8;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Devboard</h1>
    <p>A minimal task tracker built for developers to plan, track, and ship work faster.</p>
    <button>Get Started</button>
  </div>
</body>
</html>
